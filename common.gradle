project.ext.minecraft_version = "1.18.2"
project.ext.mod_version       = "0.4.3"
project.ext.mod_classifier    = ""
project.ext.mod_group         = "com.newterraforged"
project.ext.archives_base_name = "NewTerraForged"

group   = mod_group
version = mod_version + mod_classifier

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

sourceSets {
    main.resources { srcDirs += "/generated/resources" }
}

jar {
    archivesBaseName = "${archives_base_name}-${minecraft_version}"
    if (project.hasProperty("jarSuffix")) {
        archiveClassifier.set(project.jarSuffix)
    }
}
