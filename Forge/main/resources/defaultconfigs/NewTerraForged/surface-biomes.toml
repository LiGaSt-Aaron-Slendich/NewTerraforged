# NewTerraForged — surface biome climate assignments
# Pack: Terralith (82), BYG (71), Regions Unexplored (74), Biomes O' Plenty (62) = 289 biomes.
# Quark 1.18.2 — немає overworld біомів.
# Conquest Reforged / Wild Nature — у jar немає наземних біомів (лише печерні в cave-biomes.toml);
#   якщо з'являться в реєстрі — підхоплюються через auto_detect_mod_biomes = true.
# Cave / underground / nether біоми виключені (див. cave-biomes.toml).
