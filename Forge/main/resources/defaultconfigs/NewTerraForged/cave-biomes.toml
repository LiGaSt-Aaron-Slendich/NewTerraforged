# NewTerraForged — underground cave biomes (Forge registry IDs)
# config_version: bundled default revision (informational — user edits are kept unless the file is empty/corrupt).
config_version = 2

# CaveBiomeIds resolves terralith:X -> terralith:cave/X. Missing biomes are skipped with a warning.
#
# ── Format ───────────────────────────────────────────────────────────────────
# Each [[primary]] / [[transition]] / [[special]] / [[coastal]] entry:
#   id, temperature (0..1 cave climate), vegetation_density, weight, placement_type
#   stat_role = "generator"  — radial stat source in mega/giga (optional)
#
# Stats block (-10..10) goes RIGHT AFTER the entry it belongs to:
#   [primary.stats.conditions]   — minimum pool values required to spawn this biome
#   [primary.stats.global]       — applied once when biome is placed
#   [primary.stats.local]          — fades with region-hop distance from generator
#   [primary.stats.global_frost]   — global override in Frost cave systems
#   [primary.stats.global_wet]     — override in Wet systems
#   [primary.stats.global_dry]     — override in Dry systems
#   [primary.stats.global_normal]  — override in Normal systems
#
# Use [transition.stats.*] after [[transition]], [special.stats.*] after [[special]], etc.
# Keys are case-insensitive (temperature = Temperature).
#
# Blocked: minecraft:lush_caves, minecraft:blooming_caves
# Fallback only: minecraft:dripstone_caves, newterraforged:cave

# ══════════════════════════════════════════════════════════════════════════════
# Decoration & auto-registration
# ══════════════════════════════════════════════════════════════════════════════
# use_per_biome_decorators — hybrid routing (official / vanilla / legacy / compromise per biome).
# use_official_tf_decorator — single backend for every painted biome (0.3.x TF style).
# use_compromise_decorator — themed cover + scatter anchors + mega accents.
# use_vanilla_pass — TerraLith-style placeWithBiomeCheck once per feature per chunk (fast, sparse cover).
# use_legacy_decorators — full old anchor/scatter + noise-cave decorator loop (slowest, kept for rollback).
# auto_register_biomes — scan biome registry; any cave biome not listed below is registered automatically.
# blacklist — biomes that must NEVER generate in mega/giga (jungle presets use dedicated stream decorators).

[decoration]
use_per_biome_decorators = true
use_official_tf_decorator = false
use_compromise_decorator = false
use_vanilla_pass = false
use_legacy_decorators = false
auto_register_biomes = true
condition_relax = 3.0
vanilla_origin_grid = 2
vanilla_origins_per_biome = 8
vanilla_ceiling_pass = true

# Hybrid decorator routing lives in:
#   NewTerraForged/Critical Options/Hybrid options/decorator-routing.toml

blacklist = [
    "minecraft:lush_caves",
    "minecraft:blooming_caves",
    "minecraft:crimson_forest",
    "minecraft:warped_forest",
    "minecraft:nether_wastes",
    "minecraft:soul_sand_valley",
    "minecraft:basalt_deltas",
    "byg:crimson_gardens",
    "byg:warped_desert",
    "byg:embur_bog",
    "terralith:cave/underground_jungle",
    "terralith:cave/steaming_jungle",
]

